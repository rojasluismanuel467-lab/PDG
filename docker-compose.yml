version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arqdata_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./demo.db
      JWT_SECRET_KEY: demo-secret-key-change-in-prod
      ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      BACKEND_BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_db:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    container_name: arqdata_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_uploads:
  backend_db:
